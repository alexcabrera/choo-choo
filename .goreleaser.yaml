version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    main: ./cmd/choo-choo
    binary: choo-choo
    ldflags:
      - -s -w

archives:
  - formats: [ 'tar.gz' ]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

homebrew_casks:
  - name: choo-choo
    homepage: "https://github.com/alexcabrera/choo-choo"
    description: "A TUI orchestration layer for Crush coding agent with structured design → plan → execute → verify workflow"
    directory: Casks
    url:
      verified: github.com/alexcabrera/choo-choo
    repository:
      owner: alexcabrera
      name: homebrew-tap
      branch: main
    skip_upload: auto
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/choo-choo"]
          end
